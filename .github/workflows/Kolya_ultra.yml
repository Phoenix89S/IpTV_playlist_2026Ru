name: Kolya Ultra Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # запуск каждые 6 часов

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install aiohttp

      - name: Install ffmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Run Kolya Ultra Scanner
        run: |
          python3 Kolya_ultra_Scsnner.py

      - name: Commit results
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add streams/*.m3u || true
          git add *.m3u || true
          git commit -m "Kolya Ultra scan update" || echo "No changes"
          git push