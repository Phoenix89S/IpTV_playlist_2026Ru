name: Valentina Scanner

on:
  workflow_dispatch:   # ручной запуск
  schedule:
    - cron: "0 3 */4 * *"    # каждые 4 дня в 03:00
    - cron: "0 3 20 * *"     # 20 числа месяца в 03:00
    - cron: "0 4 20 * *"     # 20 числа месяца в 04:00

jobs:
  scan-ngenix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Download EPG dictionary
        run: curl -L https://epg.one/epg2.xml.gz -o epg2.xml.gz

      - name: Run Valentina.py scanner
        run: python Valentina.py

      - name: Upload TXT report
        uses: actions/upload-artifact@v4
        with:
          name: NgenixScan_report
          path: NgenixScan_report.txt

      - name: Upload M3U playlist
        uses: actions/upload-artifact@v4
        with:
          name: NgenixScan_playlist
          path: NgenixScan.m3u

      - name: Commit results back to repo
        run: |
          git config --global user.name "Valentina Scanner Bot"
          git config --global user.email "scanner@users.noreply.github.com"
          git add NgenixScan_report.txt NgenixScan.m3u epg2.xml.gz
          git commit -m "Valentina scanner auto-update: $(date +'%Y-%m-%d %H:%M:%S')"
          git push