name: Valentina Scanner

on:
  workflow_dispatch:   # ручной пинок
  schedule:
    - cron: "0 3 */4 * *"    # каждые 4 дня в 03:00
    - cron: "0 3 20 * *"     # 20 числа месяца в 03:00
    - cron: "0 4 20 * *"     # 20 числа месяца в 04:00

jobs:
  scan-ngenix-4days:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 */4 * *'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Valentina.py scanner (4-day run)
        run: python Valentina.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NgenixScan_4days
          path: |
            NgenixScan_report.txt
            NgenixScan.m3u

  scan-ngenix-20-3am:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 20 * *'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run Valentina.py scanner (20th 03:00)
        run: python Valentina.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NgenixScan_20_3am
          path: |
            NgenixScan_report.txt
            NgenixScan.m3u

  scan-ngenix-20-4am:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 4 20 * *'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Run Valentina.py scanner (20th 04:00)
        run: python Valentina.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NgenixScan_20_4am
          path: |
            NgenixScan_report.txt
            NgenixScan.m3u