name: Kolya Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install aiohttp

      - name: Run Kolya Scanner (in repo root)
        run: |
          cd $GITHUB_WORKSPACE
          python Kolya_scanner.py

      - name: Verify Kolya.m3u exists
        run: |
          cd $GITHUB_WORKSPACE
          if [ ! -f Kolya.m3u ]; then
            echo "ERROR: Kolya.m3u NOT FOUND!"
            ls -la
            exit 1
          fi

      # ============================
      #   COMMIT TO MAIN
      # ============================
      - name: Commit Kolya.m3u to main
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add Kolya.m3u

          if git diff --cached --quiet; then
            echo "No changes for main"
          else
            git commit -m "Update Kolya.m3u [main]"
            git push origin main
          fi

      # ============================
      #   COMMIT TO GH-PAGES
      # ============================
      - name: Push Kolya.m3u to gh-pages
        run: |
          cd $GITHUB_WORKSPACE

          git fetch origin gh-pages
          git switch gh-pages || git checkout -b gh-pages

          cp $GITHUB_WORKSPACE/Kolya.m3u ./Kolya.m3u

          git add Kolya.m3u

          if git diff --cached --quiet; then
            echo "No changes for gh-pages"
          else
            git commit -m "Update Kolya.m3u [gh-pages]"
            git push origin gh-pages
          fi

      - name: Return to main
        run: git switch main