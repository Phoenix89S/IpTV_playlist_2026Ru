name: SKALA Nikolay Engine

on:
  workflow_dispatch:        # ручной запуск
  schedule:
    - cron: "0 0 */3 * *"   # запуск раз в 3 дня (00:00 UTC)
    - cron: "0 0 27 * *"    # запуск 27 числа каждого месяца (00:00 UTC)

# предотвращение пересечений
concurrency:
  group: skala_nikolay_engine
  cancel-in-progress: false

jobs:
  run-skala:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run SKALA_Nikolay Engine
        run: |
          python SKALA_Nikolay.py

      - name: Commit & Push results
        run: |
          git config --global user.name "PhoenixBot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto-update (SKALA Nikolay Engine)"
          git push